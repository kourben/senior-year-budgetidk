<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senior Year 15/25/60 Budget</title>
  <meta name="theme-color" content="#1d4ed8">

  <!-- PWA Manifest -->
  <link rel="manifest" href="data:application/manifest+json,{\"name\":\"Senior Year Budget\",\"short_name\":\"Budget\",\"start_url\":\".\",\"display\":\"standalone\",\"background_color\":\"#1d4ed8\",\"theme_color\":\"#1d4ed8\"}">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

  <style>
    body { font-family: system-ui, sans-serif; }
    .category-card { transition: all 0.3s; }
    .category-card:hover { transform: translateY(-4px); }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50">

  <div class="max-w-xl mx-auto p-4 pb-24">

    <div class="text-center py-8">
      <h1 class="text-4xl font-black bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
        15 / 25 / 61 Budget
      </h1>
      <p class="text-xl mt-3 font-bold" id="phase">Phase 1: HYSA First</p>
      <p class="text-2xl mt-1" id="week">Week 1</p>
    </div>

    <!-- Editable Paycheck -->
    <input id="payInput" type="number" value="275"
      class="w-full text-center text-2xl p-4 rounded-xl border mb-4">

    <button onclick="payday()"
      class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold text-xl py-5 rounded-2xl shadow-xl mb-8">
      💰 Allocate Paycheck
    </button>

    <div id="categories" class="space-y-6"></div>

    <!-- Bottom Controls -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4">
      <div class="flex justify-around text-sm">
        <button onclick="resetAll()" class="text-red-600 font-bold">Reset</button>
        <button onclick="document.getElementById('import').click()" class="text-blue-600">Import</button>
        <input type="file" id="import" accept=".json" onchange="importData(this)" class="hidden">
        <button onclick="exportData()" class="text-green-600 font-bold">Export</button>
      </div>
    </div>

  </div>

<script>
  const GOAL = 200000; // $2,000 in cents
  let week = 1;
  let phase2 = false;

  const categories = {
    cologne: {name:"Cologne Fund", allocated:0, spent:0, rollover:true, balance:0},
    needs: {name:"Gas / Food", allocated:0, spent:0, rollover:false, balance:0},
    hysa: {name:"HYSA → College", allocated:0, spent:0, rollover:true, balance:0},
    roth: {name:"Roth IRA", allocated:0, spent:0, rollover:true, balance:0},
    taxable: {name:"Taxable Brokerage", allocated:0, spent:0, rollover:true, balance:0}
  };

  function save() {
    localStorage.setItem("budget2026",
      JSON.stringify({week, categories, phase2}));
  }

  function load() {
    const saved = localStorage.getItem("budget2026");
    if (saved) {
      const data = JSON.parse(saved);
      week = data.week || 1;
      phase2 = data.phase2 || false;
      Object.assign(categories, data.categories);
    }
    render();
  }

  function payday() {
    const pay = parseFloat(document.getElementById("payInput").value) * 100;
    if (!pay || pay <= 0) return;

    const wants = Math.round(pay * 0.15);
    const needs = Math.round(pay * 0.25);
    const wealth = pay - wants - needs;

    categories.cologne.allocated = wants;
    categories.needs.allocated = needs;

    if (!phase2) {
      categories.hysa.allocated = wealth;
      categories.roth.allocated = 0;
      categories.taxable.allocated = 0;
    } else {
      categories.hysa.allocated = 0;
      categories.roth.allocated = Math.round(wealth * 0.5);
      categories.taxable.allocated = wealth - categories.roth.allocated;
    }

    Object.keys(categories).forEach(key => {
      const cat = categories[key];

      if (cat.rollover) {
        cat.balance += cat.allocated - cat.spent;
      }

      cat.spent = 0;
    });

    if (categories.hysa.balance >= GOAL && !phase2) {
      phase2 = true;
      confetti({particleCount: 200, spread: 90});
    }

    week++;
    save();
    render();
  }

  function spend(key, amount) {
    amount = parseFloat(amount);
    if (!amount || amount <= 0) return;

    categories[key].spent += amount;
    save();
    render();
  }

  function render() {
    document.getElementById("week").textContent = `Week ${week}`;
    document.getElementById("phase").textContent =
      phase2 ? "Phase 2: Investing" : "Phase 1: HYSA First";

    const container = document.getElementById("categories");

    container.innerHTML = Object.keys(categories).map(key => {
      const cat = categories[key];

      const available = cat.rollover
        ? cat.balance + cat.allocated - cat.spent
        : cat.allocated - cat.spent;

      const pct = cat.allocated > 0
        ? (available / cat.allocated) * 100
        : 100;

      return `
      <div class="bg-white rounded-2xl p-5 shadow-lg category-card">
        <h3 class="text-lg font-bold mb-2">${cat.name}</h3>

        <div class="text-3xl font-black ${available < 0 ? 'text-red-600' : ''}">
          $${(available/100).toFixed(2)}
        </div>

        ${cat.allocated > 0
          ? `<div class="text-sm text-gray-500">
              of $${(cat.allocated/100).toFixed(2)}
             </div>`
          : ''
        }

        <div class="mt-3 bg-gray-200 rounded-full h-4 overflow-hidden">
          <div class="h-full ${available < 0 ? 'bg-red-500' : 'bg-gradient-to-r from-green-400 to-blue-500'}"
               style="width:${Math.max(0, Math.min(100, pct))}%">
          </div>
        </div>

        ${key === 'hysa'
          ? `<div class="mt-4 text-sm text-center">
              Progress to $${(GOAL/100).toFixed(0)}
              <div class="w-full bg-gray-300 h-3 rounded-full mt-1">
                <div class="bg-purple-600 h-full rounded-full"
                     style="width:${Math.min(100,(cat.balance/GOAL)*100)}%">
                </div>
              </div>
            </div>`
          : ''
        }

        <div class="flex gap-2 mt-4">
          <input type="number" placeholder="Spend"
            class="flex-1 border rounded px-2 py-1 text-sm"
            onkeydown="if(event.key==='Enter') spend('${key}', this.value*100)">
        </div>
      </div>
      `;
    }).join('');
  }

  function resetAll() {
    if (confirm("Start over?")) {
      localStorage.removeItem("budget2026");
      location.reload();
    }
  }

  function exportData() {
    const data = JSON.stringify({week, categories, phase2}, null, 2);
    const blob = new Blob([data], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "senior-budget.json";
    a.click();
  }

  function importData(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        week = data.week || 1;
        phase2 = data.phase2 || false;
        Object.assign(categories, data.categories);
        save();
        render();
        alert("Imported!");
      } catch {
        alert("Invalid file");
      }
    };
    reader.readAsText(file);
  }

  load();
</script>

</body>
</html>
