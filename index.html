<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Budget Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: system-ui; }
.card { transition: 0.3s; }
.card:hover { transform: translateY(-4px); }
</style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

<div class="max-w-4xl mx-auto">

<h1 class="text-3xl font-black text-center mb-6">
Summer Budget Tracker (March – August)
</h1>

<!-- HYSA Split -->
<div class="bg-white p-4 rounded-xl shadow mb-4 flex items-center justify-between">
<label class="font-bold">HYSA % of Wealth:</label>
<input type="number" id="hysaSplit" value="35" class="border p-2 rounded w-20">
<span class="text-sm text-gray-500">Roth gets the rest</span>
</div>

<!-- Paycheck -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
<input id="payInput" type="number" placeholder="Enter paycheck" class="w-full border p-3 rounded mb-2">
<button onclick="allocatePaycheck()" class="bg-blue-600 text-white w-full py-3 rounded font-bold">Allocate 15/25/60</button>
</div>

<!-- Summary -->
<div id="summary" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4"></div>

<!-- Add Expense -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
<h2 class="font-bold mb-2">Add Expense</h2>
<select id="category" class="border p-2 rounded w-full mb-2">
<option value="needs">Needs (25%)</option>
<option value="wants">Wants (15%)</option>
</select>
<input type="number" id="amount" placeholder="Amount" class="border p-2 rounded w-full mb-2">
<input type="text" id="note" placeholder="Note" class="border p-2 rounded w-full mb-2">
<input type="date" id="date" class="border p-2 rounded w-full mb-2">
<button onclick="addExpense()" class="bg-green-600 text-white w-full py-2 rounded">Add Expense</button>
</div>

<!-- Charts -->
<div class="grid md:grid-cols-2 gap-4 mb-4">
<div class="bg-white p-4 rounded-xl shadow">
<h3 class="font-bold mb-2">Spending Breakdown</h3>
<canvas id="spendingChart"></canvas>
</div>
<div class="bg-white p-4 rounded-xl shadow">
<h3 class="font-bold mb-2">Investment Allocation</h3>
<canvas id="investChart"></canvas>
</div>
</div>

<!-- Roth Projection -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
<h3 class="font-bold mb-2">Roth Growth Projection (7% annual)</h3>
<p id="projection" class="text-lg font-bold"></p>
</div>

<!-- Monthly Summary -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
<h3 class="font-bold mb-2">Monthly Summary</h3>
<div id="monthly"></div>
</div>

<!-- Weekly Log -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
<h3 class="font-bold mb-2">Weekly Log</h3>
<div id="weeklyLog"></div>
</div>

<!-- CSV Export -->
<div class="text-center mb-6">
<button onclick="exportCSV()" class="bg-purple-600 text-white px-6 py-2 rounded font-bold">Export Expenses (CSV)</button>
</div>

</div>

<script>
let data = { wants:0, needs:0, roth:0, hysa:0, expenses:[] };
let spendingChart, investChart;

function save() { localStorage.setItem("summerBudget", JSON.stringify(data)); }
function load() { const saved = localStorage.getItem("summerBudget"); if(saved) data = JSON.parse(saved); render(); }

function allocatePaycheck() {
const pay = parseFloat(document.getElementById("payInput").value); if(!pay) return;
const wants = pay*0.15;
const needs = pay*0.25;
const wealth = pay*0.6;
const hysaPercent = parseFloat(document.getElementById("hysaSplit").value)/100;
data.wants += wants;
data.needs += needs;
data.hysa += wealth*hysaPercent;
data.roth += wealth*(1-hysaPercent);
save(); render();
}

function addExpense() {
const amount = parseFloat(document.getElementById("amount").value);
const note = document.getElementById("note").value;
const date = document.getElementById("date").value;
const category = document.getElementById("category").value;
if(!amount || !date) return;
data[category] -= amount;
data.expenses.push({amount,note,date,category});
save(); render();
}

function render() {
document.getElementById("summary").innerHTML = `
<div class="bg-white p-4 rounded shadow"><h3 class="font-bold">Wants</h3><p>$${data.wants.toFixed(2)}</p></div>
<div class="bg-white p-4 rounded shadow"><h3 class="font-bold">Needs</h3><p>$${data.needs.toFixed(2)}</p></div>
<div class="bg-white p-4 rounded shadow"><h3 class="font-bold">Roth</h3><p>$${data.roth.toFixed(2)}</p></div>
<div class="bg-white p-4 rounded shadow"><h3 class="font-bold">HYSA</h3><p>$${data.hysa.toFixed(2)}</p></div>
`;
updateCharts(); updateProjection(); updateMonthly(); updateWeekly();
}

function updateCharts() {
const totalNeeds = data.expenses.filter(e=>e.category==="needs").reduce((s,e)=>s+e.amount,0);
const totalWants = data.expenses.filter(e=>e.category==="wants").reduce((s,e)=>s+e.amount,0);
if(spendingChart) spendingChart.destroy();
if(investChart) investChart.destroy();
spendingChart = new Chart(document.getElementById("spendingChart"), {type:"pie", data:{labels:["Needs","Wants"],datasets:[{data:[totalNeeds,totalWants],backgroundColor:["#3b82f6","#f59e0b"]}]}, options:{responsive:true}});
investChart = new Chart(document.getElementById("investChart"), {type:"pie", data:{labels:["Roth","HYSA"],datasets:[{data:[data.roth,data.hysa],backgroundColor:["#10b981","#8b5cf6"]}]}, options:{responsive:true}});
}

function updateProjection() {
const annualRate=0.07; const years=40; let future=data.roth*Math.pow(1+annualRate,years);
document.getElementById("projection").innerText=`$${future.toFixed(0)} at age ~60`;
}

function updateMonthly() {
let months={}; data.expenses.forEach(e=>{ let m=e.date.slice(0,7); if(!months[m]) months[m]=0; months[m]+=e.amount; });
let html=""; for(let m in months){ html+=`<p>${m} — $${months[m].toFixed(2)}</p>`; }
document.getElementById("monthly").innerHTML=html||"No expenses yet";
}

function updateWeekly() {
let start=new Date("2026-03-01"); let end=new Date("2026-08-31"); let weeksHTML="";
while(start<=end){
let weekStart=new Date(start); let weekEnd=new Date(start); weekEnd.setDate(weekEnd.getDate()+6);
let weekExpenses=data.expenses.filter(e=>{let d=new Date(e.date); return d>=weekStart && d<=weekEnd; });
let total=weekExpenses.reduce((s,e)=>s+e.amount,0);
weeksHTML+=`<div class="border-b py-2"><h4 class="font-bold">Week of ${weekStart.toLocaleDateString()}</h4><p class="text-sm text-gray-600">Total Spent: $${total.toFixed(2)}</p><ul class="text-sm mt-1 space-y-1">${weekExpenses.map(e=>`<li>${e.date} — $${e.amount.toFixed(2)} (${e.category})<br><span class="text-gray-500">${e.note}</span></li>`).join("")}</ul></div>`;
start.setDate(start.getDate()+7);
}
document.getElementById("weeklyLog").innerHTML=weeksHTML;
}

function exportCSV(){
let csv="Date,Category,Amount,Note\n"; data.expenses.forEach(e=>{csv+=`${e.date},${e.category},${e.amount},"${e.note}"\n`;});
const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob);
const a=document.createElement("a"); a.href=url; a.download="expenses.csv"; a.click();
}

load();
</script>

</body>
</html>
