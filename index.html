<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Budget Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: system-ui; }
.card { transition: 0.3s; }
.card:hover { transform: translateY(-4px); }
.checkbox { display: inline-block; width: 1.25rem; height: 1.25rem; border: 2px solid #3b82f6; border-radius: 0.25rem; margin-right: 0.25rem; text-align:center; font-weight:bold; color:white; cursor:pointer; }
.checkbox.checked { background: #3b82f6; color:white; }
</style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

<div class="max-w-4xl mx-auto">
<h1 class="text-3xl font-black text-center mb-6">Summer Budget Tracker (March – August)</h1>

<!-- Allocation Percentages -->
<div class="bg-white p-4 rounded-xl shadow mb-4 flex flex-col md:flex-row items-center justify-between space-y-2 md:space-y-0">
<div>
<label class="font-bold">Wants %:</label>
<input type="number" id="wantsPct" value="15" class="border p-2 rounded w-20">
<label class="font-bold ml-2">Needs %:</label>
<input type="number" id="needsPct" value="25" class="border p-2 rounded w-20">
</div>
<div>
<label class="font-bold">HYSA % of Wealth:</label>
<input type="number" id="hysaPct" value="35" class="border p-2 rounded w-20">
<span class="text-sm text-gray-500">Roth gets rest</span>
</div>
</div>

<!-- Paycheck Preview -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
<input id="payInput" type="number" placeholder="Enter paycheck" class="w-full border p-3 rounded mb-2">
<button onclick="allocatePaycheck()" class="bg-blue-600 text-white w-full py-2 rounded font-bold mb-2">Preview Allocation</button>
<div id="preview" class="bg-gray-50 p-4 rounded-xl shadow">
<h3 class="font-bold mb-2">Paycheck Allocation Preview</h3>
<p>Wants: $<span id="previewWants">0.00</span></p>
<p>Needs: $<span id="previewNeeds">0.00</span></p>
<p>HYSA: $<span id="previewHysa">0.00</span></p>
<p>Roth: $<span id="previewRoth">0.00</span></p>
</div>
</div>

<!-- Summary -->
<div id="summary" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4"></div>

<!-- Add Entry -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
<h2 class="font-bold mb-2">Add Entry</h2>
<select id="category" class="border p-2 rounded w-full mb-2">
<option value="needs">Needs</option>
<option value="wants">Wants</option>
<option value="roth">Roth</option>
<option value="hysa">HYSA</option>
</select>
<input type="number" id="amount" placeholder="Amount" class="border p-2 rounded w-full mb-2">
<input type="text" id="note" placeholder="Note" class="border p-2 rounded w-full mb-2">
<input type="date" id="date" class="border p-2 rounded w-full mb-2">
<button onclick="addEntry()" class="bg-green-600 text-white w-full py-2 rounded">Add Entry</button>
</div>

<!-- Charts -->
<div class="grid md:grid-cols-2 gap-4 mb-4">
<div class="bg-white p-4 rounded-xl shadow">
<h3 class="font-bold mb-2">Spending Breakdown</h3>
<canvas id="spendingChart"></canvas>
</div>
<div class="bg-white p-4 rounded-xl shadow">
<h3 class="font-bold mb-2">Investment Allocation</h3>
<canvas id="investChart"></canvas>
</div>
</div>

<!-- Roth Projection -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
<h3 class="font-bold mb-2">Roth Growth Projection (7% annual)</h3>
<p id="projection" class="text-lg font-bold"></p>
</div>

<!-- Weekly Log -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
<h3 class="font-bold mb-2">Weekly Log</h3>
<div id="weeklyLog"></div>
</div>

<!-- CSV Export -->
<div class="text-center mb-6">
<button onclick="exportCSV()" class="bg-purple-600 text-white px-6 py-2 rounded font-bold">Export CSV</button>
</div>

</div>

<script>
// Data
let data = { entries:[], history:[], weekChecks:{}, paychecks:{} };

// Save & Load
function save(){ localStorage.setItem("summerBudget", JSON.stringify(data)); }
function load(){ const saved = localStorage.getItem("summerBudget"); if(saved) data = JSON.parse(saved); render(); }

// Preview Allocation
function allocatePaycheck(){
  const pay = parseFloat(document.getElementById("payInput").value);
  if(!pay) return;
  const wantsPct = parseFloat(document.getElementById("wantsPct").value)/100;
  const needsPct = parseFloat(document.getElementById("needsPct").value)/100;
  const hysaPct = parseFloat(document.getElementById("hysaPct").value)/100;
  const wealth = pay*(1-wantsPct-needsPct);
  document.getElementById("previewWants").textContent = (pay*wantsPct).toFixed(2);
  document.getElementById("previewNeeds").textContent = (pay*needsPct).toFixed(2);
  document.getElementById("previewHysa").textContent = (wealth*hysaPct).toFixed(2);
  document.getElementById("previewRoth").textContent = (wealth*(1-hysaPct)).toFixed(2);
}

// Undo
function undo(){ 
if(data.history.length===0) return alert("Nothing to undo");
data = JSON.parse(data.history.pop());
save(); render();
}

// Reset
function resetAll(){ 
if(!confirm("Clear all data?")) return;
data={ entries:[], history:[], weekChecks:{}, paychecks:{} };
save(); render();
}

// Add Entry
function addEntry(){
const amount=parseFloat(document.getElementById("amount").value);
const note=document.getElementById("note").value;
const date=document.getElementById("date").value;
const category=document.getElementById("category").value;
if(!amount || !date) return;
data.history.push(JSON.stringify(data));
data.entries.push({amount,note,date,category});
save(); render();
}

// Toggle week check
function toggleCheck(weekId, type){
data.weekChecks[weekId] = data.weekChecks[weekId] || {};
data.weekChecks[weekId][type] = !data.weekChecks[weekId][type];
save(); render();
}

// Add paycheck for week
function addPaycheck(weekId){
const val = parseFloat(document.getElementById('pay-'+weekId).value);
if(!val) return;
data.paychecks[weekId] = val;
save(); render();
}

// Render
let spendingChart, investChart;
function render(){
// Calculate totals
let totalNeeds = data.entries.filter(e=>e.category==="needs").reduce((s,e)=>s+e.amount,0);
let totalWants = data.entries.filter(e=>e.category==="wants").reduce((s,e)=>s+e.amount,0);
let totalRoth = data.entries.filter(e=>e.category==="roth").reduce((s,e)=>s+e.amount,0);
let totalHysa = data.entries.filter(e=>e.category==="hysa").reduce((s,e)=>s+e.amount,0);

// Summary
document.getElementById("summary").innerHTML=`
<div class="bg-white p-4 rounded shadow"><h3 class="font-bold">Wants</h3><p>$${totalWants.toFixed(2)}</p></div>
<div class="bg-white p-4 rounded shadow"><h3 class="font-bold">Needs</h3><p>$${totalNeeds.toFixed(2)}</p></div>
<div class="bg-white p-4 rounded shadow"><h3 class="font-bold">Roth</h3><p>$${totalRoth.toFixed(2)}</p></div>
<div class="bg-white p-4 rounded shadow"><h3 class="font-bold">HYSA</h3><p>$${totalHysa.toFixed(2)}</p></div>
`;

updateCharts();
updateProjection();
updateWeekly();
}

// Charts
function updateCharts(){
const totalNeeds = data.entries.filter(e=>e.category==="needs").reduce((s,e)=>s+e.amount,0);
const totalWants = data.entries.filter(e=>e.category==="wants").reduce((s,e)=>s+e.amount,0);
const totalRoth = data.entries.filter(e=>e.category==="roth").reduce((s,e)=>s+e.amount,0);
const totalHysa = data.entries.filter(e=>e.category==="hysa").reduce((s,e)=>s+e.amount,0);

if(spendingChart) spendingChart.destroy();
if(investChart) investChart.destroy();
spendingChart = new Chart(document.getElementById("spendingChart"),{type:"pie",data:{labels:["Needs","Wants"],datasets:[{data:[totalNeeds,totalWants],backgroundColor:["#3b82f6","#f59e0b"]}]},options:{responsive:true}});
investChart = new Chart(document.getElementById("investChart"),{type:"pie",data:{labels:["Roth","HYSA"],datasets:[{data:[totalRoth,totalHysa],backgroundColor:["#10b981","#8b5cf6"]}]},options:{responsive:true}});
}

// Roth Projection
function updateProjection(){
const totalRoth = data.entries.filter(e=>e.category==="roth").reduce((s,e)=>s+e.amount,0);
const future = totalRoth*Math.pow(1+0.07,40);
document.getElementById("projection").innerText = `$${future.toFixed(0)} at age ~60`;
}

// Weekly Log
function updateWeekly(){
let start = new Date("2026-03-01");
let end = new Date("2026-08-31");
let weeksHTML = "";

while(start<=end){
let weekStart = new Date(start);
let weekEnd = new Date(start); weekEnd.setDate(weekEnd.getDate()+6);
let weekId = weekStart.toISOString().slice(0,10);

let weekEntries = data.entries.filter(e=>{
    let d = new Date(e.date).setHours(0,0,0,0);
    return d >= weekStart.setHours(0,0,0,0) && d <= weekEnd.setHours(0,0,0,0);
});
let totalSpent = weekEntries.filter(e=>e.category==="needs" || e.category==="wants").reduce((s,e)=>s+e.amount,0);

weeksHTML += `<div class="border-b py-2 mb-2">
<h4 class="font-bold">Week of ${weekStart.toLocaleDateString()}</h4>
<p class="text-sm text-gray-600 mb-1">Weekly Paycheck: $<input type="number" id="pay-${weekId}" value="${data.paychecks[weekId]||''}" class="border p-1 w-32 inline-block" onblur="addPaycheck('${weekId}')"></p>
<p class="text-sm text-gray-600 mb-1">Total Spent: $${totalSpent.toFixed(2)}</p>
<p class="text-sm mb-1">Investments: 
<span class="checkbox ${data.weekChecks[weekId]?.roth?"checked":""}" onclick="toggleCheck('${weekId}','roth')">✅</span> Roth
<span class="checkbox ${data.weekChecks[weekId]?.hysa?"checked":""}" onclick="toggleCheck('${weekId}','hysa')">✅</span>
</p>
<ul class="text-sm mt-1 space-y-1">
${weekEntries.map(e=>`<li>${e.date} — $${e.amount.toFixed(2)} (${e.category})<br><span class="text-gray-500">${e.note}</span></li>`).join("")}
</ul>
</div>`;

start.setDate(start.getDate()+7);
}

document.getElementById("weeklyLog").innerHTML = weeksHTML;
}

// CSV Export
function exportCSV(){
let csv = "Date,Category,Amount,Note\n";
data.entries.forEach(e=>{ csv+=`${e.date},${e.category},${e.amount},"${e.note}"\n`; });
const blob = new Blob([csv],{type:"text/csv"});
const url = URL.createObjectURL(blob);
const a=document.createElement("a"); a.href=url; a.download="entries.csv"; a.click();
}

// Initialize
load();
</script>

</body>
</html>
